<p>《供养人档案》是对绘画中供体形象演变的简要描述——以隋朝、唐朝、中国五代时期和西班牙文艺复兴时期绘画中的捐赠者形象为例。主要作为艺术遗产线理论研究、分析、概念、批评和传播相关工作的提交。</p>
