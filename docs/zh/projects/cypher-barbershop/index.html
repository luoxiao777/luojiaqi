    <h2 id="关于项目">关于项目</h2>
<p>CYPHER 理发店于 2020 年在西安成立。主要负责 LOGO 设计及延展应用。这里不仅仅是理发店，更是以社区为核心的交流中心、爱好交流的论坛、以及文化传承的空间。CYPHER 在这里具有文化、传递、凝聚力三种含义，在黑人文化中代表着社群之间的交流。字母 C 的运用意味着以文化接纳与交流为基本的开放包容。</p>
