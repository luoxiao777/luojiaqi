    <h2 id="关于项目">关于项目</h2>
<p>草池湾是秦岭南麓的一个古村落，是中国秦岭乡村振兴示范乡村、中国秦岭自然教育第一村。这里已有百年以上历史，是秦巴山间的一个隐世小村。在这里，42 只朱鹮和这里的 52 户村民和谐共生了十多年时间。朱鹮让这个小村拥有了灵性和诗意，时代让这个村庄充满了生机与活力。</p>
<p>负责园区手册、活动海报、包装物料等。</p>

  <div id="site-lightbox" class="lightbox" aria-hidden="true">
  <div class="lightbox-close" id="site-lightbox-close" role="button" tabindex="0" aria-label="Close">×</div>
  <button type="button" id="site-lightbox-prev" class="lightbox-nav-btn lightbox-nav-btn--prev" aria-label="Previous image">‹</button>
  <img id="site-lightbox-img" src="" alt="">
  <button type="button" id="site-lightbox-next" class="lightbox-nav-btn lightbox-nav-btn--next" aria-label="Next image">›</button>
</div>
<script>
(() => {
  const box = document.getElementById('site-lightbox');
  const img = document.getElementById('site-lightbox-img');
  const closeBtn = document.getElementById('site-lightbox-close');
  const prevBtn = document.getElementById('site-lightbox-prev');
  const nextBtn = document.getElementById('site-lightbox-next');
  if (!box || !img) return;

  let gallery = [];
  let currentIndex = -1;

  const scopeFor = (anchor) =>
    anchor.closest('article.project-showcase') ||
    anchor.closest('article.project-detail') ||
    document.body;

  const collect = (anchor) => {
    const scope = scopeFor(anchor);
    return Array.from(scope.querySelectorAll('a[data-lightbox="1"]')).map((a) => a.getAttribute('href'));
  };

  const openAt = (anchor) => {
    gallery = collect(anchor);
    const links = Array.from(scopeFor(anchor).querySelectorAll('a[data-lightbox="1"]'));
    const idx = links.indexOf(anchor);
    if (idx < 0 || gallery.length === 0) return;
    currentIndex = idx;
    img.src = gallery[currentIndex];
    const anchorImg = anchor.querySelector('img');
    img.alt = (anchorImg && anchorImg.getAttribute('alt')) || '';
    box.classList.add('active');
    box.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  };

  const close = () => {
    box.classList.remove('active');
    box.setAttribute('aria-hidden', 'true');
    img.src = '';
    img.alt = '';
    document.body.style.overflow = '';
    currentIndex = -1;
    gallery = [];
  };

  const show = (index) => {
    if (index < 0 || index >= gallery.length) return;
    currentIndex = index;
    img.src = gallery[currentIndex];
  };

  document.addEventListener('click', (e) => {
    const a = e.target.closest && e.target.closest('a[data-lightbox="1"]');
    if (!a) return;
    e.preventDefault();
    openAt(a);
  });

  closeBtn && closeBtn.addEventListener('click', close);
  closeBtn && closeBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      close();
    }
  });
  box.addEventListener('click', (e) => {
    if (e.target === box) close();
  });

  document.addEventListener('keydown', (e) => {
    if (box.getAttribute('aria-hidden') === 'true') return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowLeft' && currentIndex > 0) show(currentIndex - 1);
    else if (e.key === 'ArrowRight' && currentIndex < gallery.length - 1) show(currentIndex + 1);
  });

  prevBtn && prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentIndex > 0) show(currentIndex - 1);
  });
  nextBtn && nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentIndex < gallery.length - 1) show(currentIndex + 1);
  });
})();
</script>
